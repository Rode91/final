services:

  v1:
    build: ./v1
    container_name: v1
    ports:
      - "3002:3000"
    networks:
      - app-network

  v2:
    build: ./v2
    container_name: v2
    ports:
      - "3003:3000"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "3000:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    depends_on:
      - v1
      - v2
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile-jenkins
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - v1
      - v2
    networks:
      - app-network

volumes:
  jenkins_home:

configs:
  prometheus_config:
    file: ./prometheus/prometheus.yml
  nginx_config:
    file: ./nginx/nginx.conf

networks:
  app-network: